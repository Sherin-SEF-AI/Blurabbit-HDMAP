# Local end-to-end stack: the backend + a PostGIS database.
#   ./gradlew :backend:installDist && docker compose -f backend/docker-compose.yml up --build
# Then POST trips to http://localhost:8089/v1/trips/{id} exactly as the app does.
services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: blurabbit
      POSTGRES_USER: blurabbit
      POSTGRES_PASSWORD: blurabbit
    ports:
      - "5432:5432"
    volumes:
      - ./sql/schema-postgis.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blurabbit -d blurabbit"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      STORE: postgres
      DB_URL: jdbc:postgresql://postgis:5432/blurabbit
      DB_USER: blurabbit
      DB_PASSWORD: blurabbit
    ports:
      - "8089:8080"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata:
