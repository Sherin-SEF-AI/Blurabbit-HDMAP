# Horizontal autoscaling: fusion is CPU-bound, so scale on CPU. In production the fusion workers
# scale instead on ingestion-queue depth via KEDA (Kafka/PubSub lag) — see docs/03 / docs/07.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hdmap-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hdmap-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
