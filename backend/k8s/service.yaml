apiVersion: v1
kind: Service
metadata:
  name: hdmap-backend
  labels: { app: hdmap-backend }
spec:
  type: ClusterIP
  selector: { app: hdmap-backend }
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
# Ingestion is fronted by an Ingress/API gateway (TLS + Bearer auth) in production.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hdmap-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  rules:
    - host: api.blurabbit.example
      http:
        paths:
          - path: /v1/
            pathType: Prefix
            backend:
              service:
                name: hdmap-backend
                port: { number: 80 }
